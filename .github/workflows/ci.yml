name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify CLI
        run: python scripts/seo_forge.py --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/ || true

      - name: Check formatting
        run: ruff format --check scripts/ tests/ || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Security scan
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn -E '(api_key|secret_key|password|token|credential)\s*=' scripts/ tests/ --include="*.py" || (echo "FAIL: Potential secret found" && exit 1)
          ! grep -rn -E '(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16})' . --include="*.py" --include="*.md" --include="*.json" || (echo "FAIL: API key pattern found" && exit 1)
          echo "No secrets detected."
